name: Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Restore Nuxt build cache
        uses: actions/cache@v5
        with:
          path: |
            .nuxt
            node_modules/.cache
          key: nuxt-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            nuxt-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DB_SSH_PRIVATE_KEY }}

      - name: Open SSH tunnel to database
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DB_SSH_PORT }}" "${{ secrets.DB_SSH_HOST }}" >> ~/.ssh/known_hosts
          ssh -f -N -L 5432:localhost:5432 \
            -o BatchMode=yes \
            -o ExitOnForwardFailure=yes \
            -p "${{ secrets.DB_SSH_PORT }}" \
            "${{ secrets.DB_SSH_USER }}@${{ secrets.DB_SSH_HOST }}"

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@127.0.0.1:5432/${{ secrets.DB_NAME }}
        run: pnpm db:migrate

      - name: Build
        env:
          NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}
          NUXT_MAPBOX_TOKEN: ${{ secrets.NUXT_MAPBOX_TOKEN }}
          NUXT_TIANDITU_TOKEN: ${{ secrets.NUXT_TIANDITU_TOKEN }}
        run: pnpm build

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t "$IMAGE:latest" -t "$IMAGE:$GITHUB_SHA" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$GITHUB_SHA"
